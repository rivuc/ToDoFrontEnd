<div class="row">
  <div *ngIf="!showItemForm()">Select a To Do Task</div>

  <div class="col-xs-12" [hidden]="!showItemForm()">
    <form (ngSubmit)="onSubmit(f)" #f="ngForm">
      <div class="row">
        <div class="col-sm-10 form-group">
          <label for="title">Title</label>
          <input
            type="text"
            id="title"
            class="form-control"
            name="title"
            ngModel
            required
            minlength="5"
          />
        </div>

        <div class="row">
          <div class="col-sm-12 form-group">
            <div class="form-check form-switch d-flex align-items-center">
              <input
                type="checkbox"
                id="isDone"
                class="form-check-input"
                name="isDone"
                ngModel
              />
              <label class="form-check-label ms-2" for="isDone">Is Done</label>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-xs-12">
            <button
              type="submit"
              class="btn btn-success me-2"
              [disabled]="!f.valid"
              id="btnSubmit"
            >
              Save
            </button>
            <button
              type="button"
              class="btn btn-warning me-2"
              (click)="onCancel()"
              id="btnCancel"
            >
              Cancel
            </button>
            <button
              *ngIf="!!editedItem?.id"
              type="button"
              class="btn btn-danger me-2"
              (click)="onDelete()"
              id="btnDelete"
            >
              Delete
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
